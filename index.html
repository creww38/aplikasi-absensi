<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sistem Absensi Pintar</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { primary: '#738862', secondary: '#10B981', dark: '#111827' }
        }
      }
    }
  </script>

  <style>
    ::-webkit-scrollbar { width: 6px; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .skeleton-card { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body class="bg-slate-900 font-sans antialiased overflow-x-hidden">

  <!-- SKELETON LOADER -->
  <div id="skeletonLoader" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center">
    <div class="text-center">
      <div class="w-16 h-16 mx-auto mb-4 rounded-full border-4 border-indigo-500/30 border-t-indigo-500 animate-spin"></div>
      <p class="text-indigo-200 text-sm">Memuat Sistem Absensi...</p>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="relative min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900"></div>
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-600 rounded-full blur-[128px] opacity-40 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-600 rounded-full blur-[128px] opacity-40 animate-pulse"></div>

    <div class="relative z-10 w-full max-w-5xl bg-white/10 backdrop-blur-2xl rounded-3xl shadow-2xl overflow-hidden border border-white/10 flex flex-col lg:flex-row animate-fade-in">
      <!-- LEFT PANEL -->
      <div class="w-full lg:w-5/12 relative p-8 flex flex-col justify-center items-center text-white overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://files.catbox.moe/jl72ny.jpg');"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-indigo-900/90 via-indigo-900/60 to-indigo-900/40"></div>
        <div class="relative z-10 text-center">
          <div class="w-28 h-28 mx-auto mb-4 rounded-2xl bg-white/20 backdrop-blur-md flex items-center justify-center border-2 border-white/30 overflow-hidden">
            <img src="https://files.catbox.moe/3od6ig.png" alt="Logo" class="w-20 h-20 object-contain">
          </div>
          <h1 class="text-3xl font-bold text-white">MA Plus Keterampilan<br>Tarbiyatusshibyan</h1>
          <p class="text-indigo-200 text-sm mt-2">Platform manajemen kehadiran siswa terintegrasi</p>
        </div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="w-full lg:w-7/12 bg-white p-8 lg:p-10">
        <div class="max-w-md mx-auto">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Assalamualaikum</h2>
            <p class="text-gray-500 text-sm">Silakan masuk ke akun Anda</p>
          </div>

          <div class="bg-gray-50 p-1 rounded-xl flex mb-6">
            <button id="btnSiswaTab" onclick="switchLoginTab('siswa')" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm flex items-center justify-center gap-2">
              <i class="fas fa-user-graduate"></i> Siswa
            </button>
            <button id="btnAdminTab" onclick="switchLoginTab('admin')" class="flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-500 hover:bg-gray-100 flex items-center justify-center gap-2">
              <i class="fas fa-chalkboard-teacher"></i> Guru / Admin
            </button>
          </div>

          <form onsubmit="handleLogin(event)" class="space-y-4">
            <div id="formSiswaLogin">
              <label class="block text-xs font-bold text-gray-700 mb-1">NISN Siswa</label>
              <div class="relative">
                <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="nisn" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="Masukkan NISN">
              </div>
            </div>
            
            <div id="formAdminLogin" class="hidden space-y-4">
              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">Username</label>
                <div class="relative">
                  <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  <input type="text" id="username" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="Username">
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">Password</label>
                <div class="relative">
                  <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  <input type="password" id="password" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="••••••••">
                </div>
              </div>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full py-3.5 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold rounded-xl shadow-lg transition-all transform active:scale-[0.98] text-sm flex items-center justify-center gap-2">
              <span>MASUK SEKARANG</span> 
              <i class="fas fa-arrow-right"></i>
            </button>
          </form>
          
          <div id="loginError" class="mt-4 hidden p-3 bg-rose-50 border border-rose-100 rounded-xl flex items-start gap-3">
            <i class="fas fa-exclamation-triangle text-rose-600 mt-0.5"></i>
            <p id="errorText" class="text-xs text-rose-600">NISN/Username atau password salah.</p>
          </div>
        </div>
      </div>
    </div>
    <p class="absolute bottom-4 text-slate-500 text-xs">© 2026 Sistem Absensi Sekolah</p>
  </div>

  <!-- DASHBOARD (AWALNYA KOSONG, DIISI JS) -->
  <div id="dashboardContainer" class="hidden h-screen bg-gray-100"></div>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-2xl p-5 flex flex-col items-center shadow-2xl">
      <div class="w-10 h-10 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
      <p class="text-gray-700 text-sm font-medium">Memproses...</p>
    </div>
  </div>

  <!-- LOAD SCRIPTS ASYNC -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <script>
    // ==========================================================================
    // KONFIGURASI
    // ==========================================================================
    const API_BASE_URL = 'https://attendance-api-ivory.vercel.app/api';
    let currentUser = null;
    let html5QrCode = null;
    let adminChart = null;
    let guruChart = null;

    // Helper
    function showLoading() { document.getElementById('loadingOverlay')?.classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingOverlay')?.classList.add('hidden'); }
    function showAlert(type, msg) { Swal.fire({ icon: type, title: type === 'success' ? 'Berhasil!' : 'Gagal!', text: msg, timer: 2000, showConfirmButton: false }); }

    // API Call dengan timeout 15 detik
    async function apiCall(endpoint, method = 'GET', body = null, token = null, timeout = 15000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(`${API_BASE_URL}${endpoint}`, {
          method, headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': `Bearer ${token}` }) },
          body: body ? JSON.stringify(body) : null, signal: controller.signal
        });
        clearTimeout(timer);
        return await res.json();
      } catch (e) {
        clearTimeout(timer);
        return { success: false, message: e.name === 'AbortError' ? 'Request timeout' : e.message };
      }
    }

    // ==========================================================================
    // AUTHENTICATION
    // ==========================================================================
    function switchLoginTab(tab) {
      document.getElementById('loginError')?.classList.add('hidden');
      const siswaBtn = document.getElementById('btnSiswaTab');
      const adminBtn = document.getElementById('btnAdminTab');
      const aktif = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm flex items-center justify-center gap-2";
      const tidak = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-500 hover:bg-gray-100 flex items-center justify-center gap-2";
      
      if (tab === 'siswa') {
        siswaBtn.className = aktif; adminBtn.className = tidak;
        document.getElementById('formAdminLogin').classList.add('hidden');
        document.getElementById('formSiswaLogin').classList.remove('hidden');
      } else {
        siswaBtn.className = tidak; adminBtn.className = aktif;
        document.getElementById('formAdminLogin').classList.remove('hidden');
        document.getElementById('formSiswaLogin').classList.add('hidden');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      showLoading();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const nisn = document.getElementById('nisn').value;
      const result = await apiCall('/auth/login', 'POST', { username, password, nisn });
      
      if (result.success) {
        currentUser = result;
        localStorage.setItem('absensiAppSession', JSON.stringify(result));
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardContainer').classList.remove('hidden');
        await initDashboard();
      } else {
        hideLoading();
        const errDiv = document.getElementById('loginError');
        document.getElementById('errorText').innerText = result.message;
        errDiv.classList.remove('hidden');
        setTimeout(() => errDiv.classList.add('hidden'), 4000);
      }
    }

    function checkSession() {
      const stored = localStorage.getItem('absensiAppSession');
      if (stored) {
        try {
          const data = JSON.parse(stored);
          if (data?.success) {
            currentUser = data;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardContainer').classList.remove('hidden');
            initDashboard();
            return;
          }
        } catch(e) {}
      }
      setTimeout(() => {
        const sk = document.getElementById('skeletonLoader');
        if (sk) sk.style.display = 'none';
      }, 300);
    }

    async function logout() {
      if (html5QrCode) try { await html5QrCode.stop(); } catch(e) {}
      localStorage.removeItem('absensiAppSession');
      currentUser = null;
      document.getElementById('dashboardContainer').innerHTML = '';
      document.getElementById('dashboardContainer').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
    }

    // ==========================================================================
    // DASHBOARD INIT - FAST, NO WAITING
    // ==========================================================================
    async function initDashboard() {
      const container = document.getElementById('dashboardContainer');
      const role = currentUser.role;
      const name = currentUser.nama || currentUser.username;
      
      // Render sidebar dan layout dasar dulu (tanpa data)
      container.innerHTML = `
        <div class="flex h-screen">
          <!-- SIDEBAR -->
          <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-[rgb(26,25,103)] text-white transform -translate-x-full md:translate-x-0 transition-all duration-300 flex flex-col shadow-2xl">
            <div class="h-16 flex items-center px-6 border-b border-indigo-900/50">
              <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center"><i class="fas fa-qrcode text-sm"></i></div>
                <div><h1 class="font-bold">PINTAR</h1><p class="text-[8px] text-indigo-200">Presensi & Informasi</p></div>
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-center space-x-3 p-3 bg-black/20 rounded-xl">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-bold">${name.charAt(0)}</div>
                <div><p class="font-semibold text-xs">${name}</p><span class="text-[9px] font-bold uppercase bg-indigo-800 px-1.5 py-0.5 rounded">${role.toUpperCase()}</span></div>
              </div>
            </div>
            <nav id="sidebarMenu" class="flex-1 px-3 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-indigo-900/50">
              <button onclick="logout()" class="flex items-center space-x-3 text-red-300 hover:bg-red-500/20 w-full p-2.5 rounded-lg text-sm"><i class="fas fa-sign-out-alt w-5"></i><span>Keluar</span></button>
            </div>
          </aside>
          <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden"></div>
          <main class="flex-1 md:ml-64 h-screen overflow-y-auto">
            <header class="sticky top-0 z-20 bg-white/80 backdrop-blur-xl border-b px-6 h-16 flex items-center justify-between">
              <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-gray-100"><i class="fas fa-bars"></i></button>
              <h2 id="pageTitle" class="text-lg font-bold">Dashboard</h2>
              <div><p id="currentDateDisplay" class="text-xs text-gray-500"></p></div>
            </header>
            <div id="mainContent" class="p-6">
              <div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>
            </div>
          </main>
        </div>
      `;
      
      document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
      
      // Buat menu
      const menuHtml = [];
      const menuItems = role === 'admin' ? 
        ['Dashboard', 'fa-home', 'loadAdminDashboard()'] :
        (role === 'guru' ? ['Dashboard', 'fa-home', 'loadGuruDashboard()'] : ['Dashboard', 'fa-home', 'loadSiswaDashboard()']);
      menuHtml.push(`<a onclick="${menuItems[2]}" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white cursor-pointer"><i class="fas ${menuItems[1]} w-5"></i><span>${menuItems[0]}</span></a>`);
      
      if (role === 'admin') {
        menuHtml.push(`<a onclick="loadDataSiswa()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-user-graduate w-5"></i><span>Data Siswa</span></a>`);
        menuHtml.push(`<a onclick="loadDataGuru()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-chalkboard-teacher w-5"></i><span>Data Guru</span></a>`);
        menuHtml.push(`<a onclick="loadMonitoringAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-eye w-5"></i><span>Monitoring</span></a>`);
        menuHtml.push(`<a onclick="loadRekapAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-file-alt w-5"></i><span>Laporan</span></a>`);
        menuHtml.push(`<a onclick="loadKelolaAbsen()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-calendar-times w-5"></i><span>Hari Libur</span></a>`);
        menuHtml.push(`<a onclick="loadScanAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-qrcode w-5"></i><span>Scan QR</span></a>`);
      } else if (role === 'guru') {
        menuHtml.push(`<a onclick="loadMonitoringAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-eye w-5"></i><span>Monitoring</span></a>`);
        menuHtml.push(`<a onclick="loadScanAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-qrcode w-5"></i><span>Scan QR</span></a>`);
      } else {
        menuHtml.push(`<a onclick="loadQRCodeSiswa()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-id-card w-5"></i><span>Kartu Saya</span></a>`);
      }
      document.getElementById('sidebarMenu').innerHTML = menuHtml.join('');
      
      // Load dashboard sesuai role (langsung render skeleton dulu, lalu data)
      if (role === 'admin') await loadAdminDashboard();
      else if (role === 'guru') await loadGuruDashboard();
      else await loadSiswaDashboard();
      
      hideLoading();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('mobileOverlay');
      if (window.innerWidth < 768) {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
      } else {
        sidebar.classList.toggle('w-64');
        sidebar.classList.toggle('w-20');
        document.querySelector('main').classList.toggle('md:ml-64');
        document.querySelector('main').classList.toggle('md:ml-20');
      }
    }

    // ==========================================================================
    // ADMIN DASHBOARD - FAST RENDER
    // ==========================================================================
    async function loadAdminDashboard() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center"><h1 class="text-2xl font-bold">Dashboard Admin</h1><button onclick="refreshDashboard()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-sync-alt mr-2"></i>Refresh</button></div>
          <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
            ${['Total', 'Hadir', 'Sakit', 'Izin', 'Alpa'].map(l => `<div class="bg-white p-5 rounded-xl shadow-sm"><div class="skeleton-card h-12 w-full"></div></div>`).join('')}
          </div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-white rounded-2xl p-6 h-80"><div class="skeleton-card h-full w-full"></div></div>
            <div class="bg-white rounded-2xl p-6"><div class="skeleton-card h-40 w-full mb-4"></div><div class="skeleton-card h-40 w-full"></div></div>
          </div>
        </div>
      `;
      
      const result = await apiCall('/absensi/monitoring', 'GET', null, currentUser.token);
      if (result.success) {
        const data = result.data;
        const total = data.length, hadir = data.filter(d=>d.status==='Hadir').length, sakit = data.filter(d=>d.status==='Sakit').length, izin = data.filter(d=>d.status==='Izin').length, alpa = data.filter(d=>d.status==='Alpa').length;
        content.innerHTML = `
          <div class="space-y-6"><div class="flex justify-between"><h1 class="text-2xl font-bold">Dashboard Admin</h1><button onclick="refreshDashboard()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-sync-alt mr-2"></i>Refresh</button></div>
          <div class="grid grid-cols-2 md:grid-cols-5 gap-4">${[['Total',total,'users','indigo'],['Hadir',hadir,'check','emerald'],['Sakit',sakit,'procedures','yellow'],['Izin',izin,'paper-plane','blue'],['Alpa',alpa,'times','red']].map(([l,v,i,c])=>`<div class="bg-white p-5 rounded-xl shadow-sm"><p class="text-xs text-gray-400">${l}</p><div class="flex justify-between items-center mt-1"><h3 class="text-2xl font-bold">${v}</h3><div class="w-8 h-8 bg-${c}-100 text-${c}-600 rounded-lg flex items-center justify-center"><i class="fas fa-${i}"></i></div></div></div>`).join('')}</div>
          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-2 bg-white rounded-2xl p-6"><canvas id="adminChart"></canvas></div><div class="bg-white rounded-2xl p-6"><h3 class="font-bold mb-4">Akses Cepat</h3><div class="space-y-3">${[['Data Siswa','user-graduate','loadDataSiswa()'],['Monitoring','eye','loadMonitoringAbsensi()'],['Laporan','file-alt','loadRekapAbsensi()'],['Scan QR','qrcode','loadScanAbsensi()']].map(([l,i,fn])=>`<button onclick="${fn}" class="w-full flex items-center p-3 rounded-xl border hover:bg-indigo-50"><div class="w-10 h-10 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center mr-3"><i class="fas fa-${i}"></i></div><div class="font-bold text-sm">${l}</div></button>`).join('')}</div></div></div></div>
        `;
        const ctx = document.getElementById('adminChart')?.getContext('2d');
        if (ctx) { if (adminChart) adminChart.destroy(); adminChart = new Chart(ctx, { type: 'bar', data: { labels: ['Hadir','Sakit','Izin','Alpa'], datasets: [{ data: [hadir,sakit,izin,alpa], backgroundColor: ['#10B981','#EAB308','#3B82F6','#EF4444'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } }); }
      }
    }

    // ==========================================================================
    // GURU DASHBOARD
    // ==========================================================================
    async function loadGuruDashboard() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>`;
      const kelas = currentUser.kelas;
      const result = await apiCall(kelas ? `/absensi/monitoring?kelas=${kelas}` : '/absensi/monitoring', 'GET', null, currentUser.token);
      if (result.success) {
        const data = result.data;
        const total = data.length, sakit = data.filter(d=>d.status==='Sakit').length, izin = data.filter(d=>d.status==='Izin').length, alpa = data.filter(d=>d.status==='Alpa').length, hadir = data.filter(d=>d.status==='Hadir').length;
        content.innerHTML = `
          <div><div class="flex justify-between mb-6"><h1 class="text-2xl font-bold">Dashboard Guru</h1><button onclick="refreshDashboard()" class="bg-gray-200 px-4 py-2 rounded-lg text-sm"><i class="fas fa-sync-alt mr-2"></i>Refresh</button></div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">${[['Total',total,'users','indigo'],['Sakit',sakit,'procedures','yellow'],['Izin',izin,'paper-plane','blue'],['Alpa',alpa,'times','red']].map(([l,v,i,c])=>`<div class="bg-white p-5 rounded-xl"><p class="text-xs text-gray-400">${l}</p><h3 class="text-3xl font-bold">${v}</h3><div class="w-10 h-10 bg-${c}-100 text-${c}-600 rounded-lg flex items-center justify-center mt-2"><i class="fas fa-${i}"></i></div></div>`).join('')}</div>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="bg-white rounded-2xl p-6"><canvas id="guruChart"></canvas></div><div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-2xl p-6 text-white text-center"><div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center text-2xl mx-auto mb-4"><i class="fas fa-qrcode"></i></div><h3 class="font-bold">Scan Absensi</h3><button onclick="loadScanAbsensi()" class="mt-4 bg-white text-indigo-700 px-6 py-2 rounded-lg text-sm font-bold w-full">Buka Scanner</button></div></div></div>
        `;
        const ctx = document.getElementById('guruChart')?.getContext('2d');
        if (ctx) { if (guruChart) guruChart.destroy(); guruChart = new Chart(ctx, { type: 'bar', data: { labels: ['Hadir','Sakit','Izin','Alpa'], datasets: [{ data: [hadir,sakit,izin,alpa], backgroundColor: ['#10B981','#EAB308','#3B82F6','#EF4444'] }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } }); }
      }
    }

    // ==========================================================================
    // SISWA DASHBOARD
    // ==========================================================================
    async function loadSiswaDashboard() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>`;
      const result = await apiCall(`/absensi/today/${currentUser.nisn}`, 'GET', null, currentUser.token);
      const absen = result.data;
      const today = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      content.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6"><div class="lg:col-span-2"><div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-6 text-white"><div class="flex justify-between"><div><p class="text-sm opacity-80">${today}</p><h2 class="text-2xl font-bold">Hai, ${currentUser.nama}</h2><p class="text-indigo-200 text-sm">${currentUser.kelas}</p></div><div class="px-3 py-1 bg-white/20 rounded-full text-xs">${absen?.jamDatang ? (absen.jamPulang ? '✅ Selesai' : '⏳ Sedang') : '❌ Belum Absen'}</div></div><div class="grid grid-cols-2 gap-4 mt-6"><div class="bg-white/10 rounded-xl p-4 text-center"><p class="text-xs">Jam Datang</p><p class="text-2xl font-mono font-bold">${absen?.jamDatang || '--:--'}</p></div><div class="bg-white/10 rounded-xl p-4 text-center"><p class="text-xs">Jam Pulang</p><p class="text-2xl font-mono font-bold">${absen?.jamPulang || '--:--'}</p></div></div></div>${!absen?.jamDatang ? `<div class="bg-rose-50 border border-rose-200 rounded-xl p-4 mt-4 flex items-center gap-3"><i class="fas fa-exclamation-triangle text-rose-500"></i><p class="text-rose-700 text-sm">Anda belum absen hari ini! Silakan scan QR Code.</p></div>` : ''}</div><div class="space-y-4"><div class="bg-white rounded-2xl p-6 text-center"><div class="w-20 h-20 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white text-3xl mx-auto mb-3">${currentUser.nama.charAt(0)}</div><h3 class="font-bold">${currentUser.nama}</h3><p class="text-gray-500 text-sm">${currentUser.nisn}</p><p class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs inline-block mt-2">${currentUser.kelas}</p></div><button onclick="loadQRCodeSiswa()" class="w-full bg-slate-800 text-white py-3 rounded-xl flex items-center justify-center gap-2"><i class="fas fa-qrcode"></i> Kartu Digital</button><button onclick="loadScanAbsensi()" class="w-full bg-indigo-600 text-white py-3 rounded-xl flex items-center justify-center gap-2"><i class="fas fa-camera"></i> Scan Absensi</button></div></div>
      `;
    }

    // ==========================================================================
    // DATA SISWA (Fast dengan skeleton)
    // ==========================================================================
    async function loadDataSiswa() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="bg-white rounded-xl p-6"><div class="skeleton-card h-10 w-full mb-4"></div><div class="space-y-2">${Array(5).fill().map(()=>`<div class="skeleton-card h-16 w-full"></div>`).join('')}</div></div>`;
      const result = await apiCall('/siswa', 'GET', null, currentUser.token);
      if (result.success) {
        const siswa = result.data.slice(0, 30);
        content.innerHTML = `
          <div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="p-4 border-b flex justify-between items-center"><h3 class="font-bold">Data Siswa</h3><button onclick="showAddSiswaModal()" class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm"><i class="fas fa-plus mr-1"></i>Tambah</button></div><div class="p-4"><input type="text" id="searchSiswa" onkeyup="filterSiswa()" placeholder="Cari nama/NISN..." class="w-full p-2 border rounded-lg text-sm"></div><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-3 text-left">No</th><th class="p-3 text-left">Nama</th><th class="p-3 text-left">NISN</th><th class="p-3 text-left">Kelas</th><th class="p-3 text-center">Aksi</th></tr></thead><tbody id="siswaTable">${siswa.map((s,i)=>`<tr class="border-b"><td class="p-3">${i+1}</td><td class="p-3 font-medium">${s.nama}</td><td class="p-3">${s.nisn}</td><td class="p-3"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs">${s.kelas}</span></td><td class="p-3 text-center"><button onclick='editSiswaModal(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="text-amber-600 mr-2"><i class="fas fa-edit"></i></button><button onclick="deleteSiswa('${s.nisn}','${s.nama}')" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div></div>
        `;
      }
    }

    window.filterSiswa = function() {
      const keyword = document.getElementById('searchSiswa')?.value.toLowerCase() || '';
      const rows = document.querySelectorAll('#siswaTable tr');
      rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(keyword) ? '' : 'none';
      });
    };

    window.showAddSiswaModal = () => showModal(`
      <div class="bg-white rounded-2xl p-6 max-w-md w-full"><h3 class="text-xl font-bold mb-4">Tambah Siswa</h3><form onsubmit="saveSiswa(event, false)"><input name="nama" placeholder="Nama" class="w-full p-2 border rounded mb-3" required><input name="nisn" placeholder="NISN" class="w-full p-2 border rounded mb-3" required><input name="kelas" placeholder="Kelas" class="w-full p-2 border rounded mb-3" required><div class="flex justify-end gap-2"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">Batal</button><button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Simpan</button></div></form></div>
    `);
    window.editSiswaModal = (s) => showModal(`
      <div class="bg-white rounded-2xl p-6 max-w-md w-full"><h3 class="text-xl font-bold mb-4">Edit Siswa</h3><form onsubmit="saveSiswa(event, true)"><input name="nama" value="${s.nama}" class="w-full p-2 border rounded mb-3" required><input name="nisn" value="${s.nisn}" class="w-full p-2 border rounded mb-3 bg-gray-100" readonly><input name="kelas" value="${s.kelas}" class="w-full p-2 border rounded mb-3" required><input type="hidden" name="oldNisn" value="${s.nisn}"><div class="flex justify-end gap-2"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">Batal</button><button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Simpan</button></div></form></div>
    `);
    async function saveSiswa(e, isEdit) { e.preventDefault(); showLoading(); const fd = new FormData(e.target); const data = { nama: fd.get('nama'), nisn: fd.get('nisn'), kelas: fd.get('kelas') }; let res; if (isEdit) res = await apiCall(`/siswa/${fd.get('oldNisn')}`, 'PUT', data, currentUser.token); else res = await apiCall('/siswa', 'POST', data, currentUser.token); hideLoading(); if (res.success) { closeModal(); loadDataSiswa(); showAlert('success', res.message); } else showAlert('error', res.message); }
    async function deleteSiswa(nisn, nama) { const conf = await Swal.fire({ title: 'Hapus?', text: `Hapus ${nama}?`, icon: 'warning', showCancelButton: true }); if (conf.isConfirmed) { showLoading(); const res = await apiCall(`/siswa/${nisn}`, 'DELETE', null, currentUser.token); hideLoading(); if (res.success) loadDataSiswa(); else showAlert('error', res.message); } }

    // ==========================================================================
    // DATA GURU, MONITORING, REKAP (simplified, fast)
    // ==========================================================================
    async function loadDataGuru() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>`;
      const res = await apiCall('/guru', 'GET', null, currentUser.token);
      if (res.success) {
        content.innerHTML = `<div class="bg-white rounded-xl overflow-hidden"><div class="p-4 border-b"><h3 class="font-bold">Data Guru</h3></div><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-3">Username</th><th class="p-3">Nama</th><th class="p-3">Kelas</th><th class="p-3">Role</th></tr></thead><tbody>${res.data.map(g=>`<tr class="border-b"><td class="p-3">${g.username}</td><td class="p-3">${g.nama}</td><td class="p-3">${g.kelas || '-'}</td><td class="p-3"><span class="px-2 py-1 rounded text-xs ${g.role==='admin'?'bg-purple-100 text-purple-700':'bg-gray-100'}">${g.role}</span></td></tr>`).join('')}</tbody></table></div></div>`;
      }
    }

    async function loadMonitoringAbsensi() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>`;
      const kelas = currentUser.role === 'guru' ? currentUser.kelas : null;
      const res = await apiCall(kelas ? `/absensi/monitoring?kelas=${kelas}` : '/absensi/monitoring', 'GET', null, currentUser.token);
      if (res.success) {
        content.innerHTML = `<div class="bg-white rounded-xl overflow-hidden"><div class="p-4 border-b"><h3 class="font-bold">Monitoring Kehadiran</h3><p class="text-xs text-gray-500">${new Date().toLocaleDateString('id-ID')}</p></div><div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-3">Nama</th><th class="p-3">Kelas</th><th class="p-3">Datang</th><th class="p-3">Pulang</th><th class="p-3">Status</th></tr></thead><tbody>${res.data.map(d=>`<tr class="border-b"><td class="p-3 font-medium">${d.nama}</td><td class="p-3">${d.kelas}</td><td class="p-3">${d.jamDatang}</td><td class="p-3">${d.jamPulang}</td><td class="p-3"><span class="px-2 py-1 rounded text-xs ${d.status==='Hadir'?'bg-green-100 text-green-700':'bg-gray-100'}">${d.status}</span></td></tr>`).join('')}</tbody></table></div></div>`;
      }
    }

    async function loadRekapAbsensi() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="bg-white rounded-xl p-6"><div class="flex gap-4 mb-4"><input type="date" id="startDate" class="p-2 border rounded flex-1"><input type="date" id="endDate" class="p-2 border rounded flex-1"><button onclick="applyRekap()" class="bg-indigo-600 text-white px-4 rounded">Cari</button></div><div id="rekapResult" class="text-center text-gray-500 py-10">Pilih tanggal untuk melihat laporan</div></div>`;
    }
    window.applyRekap = async () => {
      const start = document.getElementById('startDate').value, end = document.getElementById('endDate').value;
      if (!start || !end) return showAlert('error', 'Pilih tanggal');
      showLoading();
      const res = await apiCall(`/absensi?tanggalMulai=${start}&tanggalAkhir=${end}`, 'GET', null, currentUser.token);
      hideLoading();
      const resultDiv = document.getElementById('rekapResult');
      if (res.success && res.data.length) {
        resultDiv.innerHTML = `<div class="overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-2">Tanggal</th><th class="p-2">Nama</th><th class="p-2">Kelas</th><th class="p-2">Datang</th><th class="p-2">Pulang</th></tr></thead><tbody>${res.data.map(d=>`<tr class="border-b"><td class="p-2">${d.tanggal}</td><td class="p-2">${d.nama}</td><td class="p-2">${d.kelas}</td><td class="p-2">${d.jamDatang}</td><td class="p-2">${d.jamPulang}</td></tr>`).join('')}</tbody></table></div>`;
      } else resultDiv.innerHTML = '<div class="text-center text-gray-500 py-10">Tidak ada data</div>';
    };

    async function loadKelolaAbsen() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="bg-white rounded-xl p-6"><h3 class="font-bold mb-4">Hari Libur</h3><form onsubmit="addLibur(event)" class="flex gap-2 mb-4"><input type="date" name="tanggal" required class="p-2 border rounded flex-1"><input type="text" name="keterangan" placeholder="Keterangan" required class="p-2 border rounded flex-1"><button type="submit" class="bg-emerald-600 text-white px-4 rounded">Tambah</button></form><div id="liburList" class="space-y-2"></div></div>`;
      const res = await apiCall('/config/holidays', 'GET', null, currentUser.token);
      if (res.success) document.getElementById('liburList').innerHTML = res.data.map(l => `<div class="flex justify-between items-center p-3 border-b"><span>${l.tanggal} - ${l.keterangan}</span><button onclick="deleteLibur('${l.tanggal}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`).join('');
    }
    window.addLibur = async (e) => { e.preventDefault(); showLoading(); const fd = new FormData(e.target); const res = await apiCall('/config/holidays', 'POST', { tanggal: fd.get('tanggal'), keterangan: fd.get('keterangan') }, currentUser.token); hideLoading(); if (res.success) { loadKelolaAbsen(); showAlert('success', 'Ditambahkan'); } else showAlert('error', res.message); };
    window.deleteLibur = async (tgl) => { showLoading(); const res = await apiCall(`/config/holidays/${tgl}`, 'DELETE', null, currentUser.token); hideLoading(); if (res.success) loadKelolaAbsen(); else showAlert('error', res.message); };

    // ==========================================================================
    // SCANNER & KARTU
    // ==========================================================================
    function loadScanAbsensi() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="max-w-sm mx-auto"><div class="bg-white rounded-2xl p-4"><div class="relative w-full aspect-square bg-black rounded-xl overflow-hidden mb-4"><div id="reader" class="w-full h-full"></div><div id="camLoader" class="absolute inset-0 bg-black/80 flex items-center justify-center"><i class="fas fa-spinner fa-pulse text-white text-2xl"></i></div></div><div id="scanResult" class="text-center text-sm mb-3"></div><div class="flex gap-2"><button onclick="startScanner('environment')" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg">Kamera Belakang</button><button onclick="backToDashboard()" class="flex-1 bg-gray-200 py-2 rounded-lg">Kembali</button></div></div></div>`;
      setTimeout(() => startScanner('environment'), 100);
    }
    function startScanner(mode) { if (html5QrCode) html5QrCode.stop().then(() => initScanner(mode)).catch(() => initScanner(mode)); else initScanner(mode); }
    function initScanner(mode) { const loader = document.getElementById('camLoader'); if(loader) loader.style.display = 'flex'; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: mode }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).then(() => { if(loader) loader.style.display = 'none'; }).catch(() => { if(loader) loader.innerHTML = '<div class="text-white text-center">Gagal akses kamera</div>'; }); }
    async function onScanSuccess(text) { html5QrCode?.stop(); const res = await apiCall('/absensi/scan', 'POST', { nisn: text, scannerRole: currentUser.role, scannerKelas: currentUser.kelas }, currentUser.token); const resDiv = document.getElementById('scanResult'); if (resDiv) { resDiv.innerHTML = `<div class="p-3 rounded-lg ${res.success ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${res.message}</div>`; setTimeout(() => { if (resDiv) resDiv.innerHTML = ''; }, 3000); } }
    function backToDashboard() { if (html5QrCode) html5QrCode.stop().catch(()=>{}); refreshDashboard(); }
    function loadQRCodeSiswa() {
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-12"><div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full"><div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white text-center"><h2 class="text-2xl font-bold">KARTU PELAJAR</h2></div><div class="p-8 text-center"><div class="bg-white p-3 rounded-2xl shadow inline-block mb-5"><div id="qrContainer"></div></div><h3 class="text-2xl font-bold mb-1">${currentUser.nama}</h3><p class="text-indigo-600 font-bold mb-3">${currentUser.nisn}</p><span class="bg-gray-200 px-4 py-1.5 rounded-full text-sm">${currentUser.kelas}</span></div><div class="p-5 flex gap-4"><button onclick="window.print()" class="flex-1 bg-gray-900 text-white py-3 rounded-xl">Cetak</button><button onclick="refreshDashboard()" class="flex-1 border py-3 rounded-xl">Tutup</button></div></div></div>`;
      setTimeout(() => new QRCode(document.getElementById("qrContainer"), { text: String(currentUser.nisn), width: 160, height: 160, colorDark: "#1f2937", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H }), 100);
    }

    function refreshDashboard() {
      if (currentUser.role === 'admin') loadAdminDashboard();
      else if (currentUser.role === 'guru') loadGuruDashboard();
      else loadSiswaDashboard();
    }

    window.refreshDashboard = refreshDashboard;
    window.loadAdminDashboard = loadAdminDashboard;
    window.loadGuruDashboard = loadGuruDashboard;
    window.loadSiswaDashboard = loadSiswaDashboard;
    window.loadDataSiswa = loadDataSiswa;
    window.loadDataGuru = loadDataGuru;
    window.loadMonitoringAbsensi = loadMonitoringAbsensi;
    window.loadRekapAbsensi = loadRekapAbsensi;
    window.loadKelolaAbsen = loadKelolaAbsen;
    window.loadScanAbsensi = loadScanAbsensi;
    window.loadQRCodeSiswa = loadQRCodeSiswa;
    window.startScanner = startScanner;
    window.backToDashboard = backToDashboard;
    window.closeModal = closeModal;

    function closeModal() { document.getElementById('modalContainer') ? document.getElementById('modalContainer').innerHTML = '' : null; }
    const modalContainer = document.createElement('div'); modalContainer.id = 'modalContainer'; document.body.appendChild(modalContainer);
    
    // Start
    checkSession();
  </script>
</body>
</html>
