    .calendar-holiday {
      background: #fecdd3 !important;
      color: #be123c !important;
      font-weight: bold !important;
      position: relative;
    }
    .calendar-holiday::after {
      content: '🎉';
      position: absolute;

<body class="bg-slate-900 font-sans antialiased overflow-x-hidden">

  <!-- LOGIN PAGE (Langsung tampil, tanpa loading awal) -->

      <!-- RIGHT PANEL -->

        <div class="max-w-md mx-auto">
          <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Assalamualaikum</h2>
            <p class="text-gray-500 text-sm">Silakan masuk ke akun Anda</p>
          </div>

          <div class="bg-gray-50 p-1 rounded-xl flex mb-6">
            <button id="btnSiswaTab" onclick="switchLoginTab('siswa')" class="flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm flex items-center justify-center gap-2">

            <button id="btnAdminTab" onclick="switchLoginTab('admin')" class="flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-500 hover:bg-gray-100 flex items-center justify-center gap-2">

          <form onsubmit="handleLogin(event)" class="space-y-4">
            <div id="formSiswaLogin">
              <label class="block text-xs font-bold text-gray-700 mb-1">NISN Siswa</label>
              <div class="relative">
                <i class="fas fa-id-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="nisn" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="Masukkan NISN" value="0093777491">
              </div>

            <div id="formAdminLogin" class="hidden space-y-4">

                  <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  <input type="text" id="username" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="Username" value="admin">

              </div>
              <div>
                <label class="block text-xs font-bold text-gray-700 mb-1">Password</label>
                <div class="relative">
                  <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                  <input type="password" id="password" class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition-all" placeholder="••••••••" value="admin123">
                </div>
              </div>
            </div>
            
            <button type="submit" id="loginBtn" class="w-full py-3.5 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold rounded-xl shadow-lg transition-all transform active:scale-[0.98] text-sm flex items-center justify-center gap-2">
              <span>MASUK SEKARANG</span> 
              <i class="fas fa-arrow-right"></i>

          </form>
          
          <div id="loginError" class="mt-4 hidden p-3 bg-rose-50 border border-rose-100 rounded-xl flex items-start gap-3">
            <i class="fas fa-exclamation-triangle text-rose-600 mt-0.5"></i>
            <p id="errorText" class="text-xs text-rose-600">NISN/Username atau password salah.</p>
          </div>
        </div>
      </div>
    </div>
    <p class="absolute bottom-4 text-slate-500 text-xs">© 2026 Sistem Absensi Sekolah</p>
  </div>

  <!-- DASHBOARD CONTAINER -->
  <div id="dashboardContainer" class="hidden h-screen bg-gray-100"></div>

  <!-- LOADING OVERLAY (Hanya untuk proses simpan/loading data) -->
  <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-2xl p-4 flex flex-col items-center shadow-2xl">
      <div class="w-8 h-8 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-2"></div>
      <p class="text-gray-700 text-xs font-medium">Memproses...</p>
    </div>
  </div>

  <!-- MODAL CONTAINER -->
  <div id="modalContainer"></div>

  <!-- LOAD SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    // ==========================================================================
    // KONFIGURASI
    // ==========================================================================
    const API_BASE_URL = 'https://attendance-api-ivory.vercel.app/api';
    let currentUser = null;
    let html5QrCode = null;
    let adminChart = null;
    let guruChart = null;
    let holidayCalendar = null;
    let holidaysList = [];
    let appConfig = { jam_masuk_mulai: '07:00', jam_masuk_akhir: '07:30', jam_pulang_mulai: '15:30', jam_pulang_akhir: '16:00' };

    // Helper
    function showLoading() { document.getElementById('loadingOverlay')?.classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loadingOverlay')?.classList.add('hidden'); }
    function showAlert(type, msg) { Swal.fire({ icon: type, title: type === 'success' ? 'Berhasil!' : 'Gagal!', text: msg, timer: 2000, showConfirmButton: false }); }

    // API Call
    async function apiCall(endpoint, method = 'GET', body = null, token = null, timeout = 15000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeout);
      try {
        const res = await fetch(`${API_BASE_URL}${endpoint}`, {
          method, headers: { 'Content-Type': 'application/json', ...(token && { 'Authorization': `Bearer ${token}` }) },
          body: body ? JSON.stringify(body) : null, signal: controller.signal
        });
        clearTimeout(timer);
        return await res.json();
      } catch (e) {
        clearTimeout(timer);
        return { success: false, message: e.name === 'AbortError' ? 'Request timeout' : e.message };
      }
    }

    async function loadAppConfig() {
      const result = await apiCall('/config', 'GET', null, currentUser?.token);
      if (result.success && result.data) {
        appConfig = {
          jam_masuk_mulai: result.data.jam_masuk_mulai || '07:00',
          jam_masuk_akhir: result.data.jam_masuk_akhir || '07:30',
          jam_pulang_mulai: result.data.jam_pulang_mulai || '15:30',
          jam_pulang_akhir: result.data.jam_pulang_akhir || '16:00'
        };
      }
    }

    // ==========================================================================
    // AUTHENTICATION
    // ==========================================================================
    function switchLoginTab(tab) {
      document.getElementById('loginError')?.classList.add('hidden');
      const siswaBtn = document.getElementById('btnSiswaTab');
      const adminBtn = document.getElementById('btnAdminTab');
      const aktif = "flex-1 py-2.5 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm flex items-center justify-center gap-2";
      const tidak = "flex-1 py-2.5 text-sm font-medium rounded-lg text-gray-500 hover:bg-gray-100 flex items-center justify-center gap-2";
      
      if (tab === 'siswa') {
        siswaBtn.className = aktif; adminBtn.className = tidak;
        document.getElementById('formAdminLogin').classList.add('hidden');
        document.getElementById('formSiswaLogin').classList.remove('hidden');
      } else {
        siswaBtn.className = tidak; adminBtn.className = aktif;
        document.getElementById('formAdminLogin').classList.remove('hidden');
        document.getElementById('formSiswaLogin').classList.add('hidden');
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      showLoading();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const nisn = document.getElementById('nisn').value;
      const result = await apiCall('/auth/login', 'POST', { username, password, nisn });
      
      if (result.success) {
        currentUser = result;
        localStorage.setItem('absensiAppSession', JSON.stringify(result));
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardContainer').classList.remove('hidden');
        await loadAppConfig();
        await initDashboard();
      } else {
        hideLoading();
        const errDiv = document.getElementById('loginError');
        document.getElementById('errorText').innerText = result.message;
        errDiv.classList.remove('hidden');
        setTimeout(() => errDiv.classList.add('hidden'), 4000);
      }
    }

    function checkSession() {
      const stored = localStorage.getItem('absensiAppSession');
      if (stored) {
        try {
          const data = JSON.parse(stored);
          if (data?.success) {
            currentUser = data;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardContainer').classList.remove('hidden');
            loadAppConfig().then(() => initDashboard());
            return;
          }
        } catch(e) {}
      }
    }

    async function logout() {
      if (html5QrCode) try { await html5QrCode.stop(); } catch(e) {}
      localStorage.removeItem('absensiAppSession');
      currentUser = null;
      document.getElementById('dashboardContainer').innerHTML = '';
      document.getElementById('dashboardContainer').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
    }

    // ==========================================================================
    // DASHBOARD INIT
    // ==========================================================================
    async function initDashboard() {
      const container = document.getElementById('dashboardContainer');
      const role = currentUser.role;
      const name = currentUser.nama || currentUser.username;
      
      container.innerHTML = `
        <div class="flex h-screen">
          <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-[rgb(26,25,103)] text-white transform -translate-x-full md:translate-x-0 transition-all duration-300 flex flex-col shadow-2xl">
            <div class="h-16 flex items-center px-6 border-b border-indigo-900/50">
              <div class="flex items-center space-x-3">
                <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center"><i class="fas fa-qrcode text-sm"></i></div>
                <div><h1 class="font-bold">PINTAR</h1><p class="text-[8px] text-indigo-200">Presensi & Informasi</p></div>
              </div>
            </div>
            <div class="p-4">
              <div class="flex items-center space-x-3 p-3 bg-black/20 rounded-xl">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center font-bold">${name.charAt(0)}</div>
                <div><p class="font-semibold text-xs">${name}</p><span class="text-[9px] font-bold uppercase bg-indigo-800 px-1.5 py-0.5 rounded">${role.toUpperCase()}</span></div>
              </div>
            </div>
            <nav id="sidebarMenu" class="flex-1 px-3 space-y-1 overflow-y-auto"></nav>
            <div class="p-4 border-t border-indigo-900/50">
              <button onclick="logout()" class="flex items-center space-x-3 text-red-300 hover:bg-red-500/20 w-full p-2.5 rounded-lg text-sm"><i class="fas fa-sign-out-alt w-5"></i><span>Keluar</span></button>
            </div>
          </aside>
          <div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/50 z-30 hidden"></div>
          <main class="flex-1 md:ml-64 h-screen overflow-y-auto">
            <header class="sticky top-0 z-20 bg-white/80 backdrop-blur-xl border-b px-6 h-16 flex items-center justify-between">
              <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-gray-100"><i class="fas fa-bars"></i></button>
              <h2 id="pageTitle" class="text-lg font-bold">Dashboard</h2>
              <div><p id="currentDateDisplay" class="text-xs text-gray-500"></p></div>
            </header>
            <div id="mainContent" class="p-6">
              <div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>
            </div>
          </main>
        </div>
      `;
      
      document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
      
      const menuHtml = [];
      
      if (role === 'admin') {
        menuHtml.push(`<a onclick="loadAdminDashboard()" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white cursor-pointer"><i class="fas fa-home w-5"></i><span>Dashboard</span></a>`);
        menuHtml.push(`<a onclick="loadDataSiswa()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-user-graduate w-5"></i><span>Data Siswa</span></a>`);
        menuHtml.push(`<a onclick="loadDataGuru()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-chalkboard-teacher w-5"></i><span>Data Guru</span></a>`);
        menuHtml.push(`<a onclick="loadMonitoringAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-eye w-5"></i><span>Monitoring</span></a>`);
        menuHtml.push(`<a onclick="loadRekapAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-file-alt w-5"></i><span>Laporan</span></a>`);
        menuHtml.push(`<a onclick="loadKelolaAbsen()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-calendar-alt w-5"></i><span>Hari Libur</span></a>`);
        menuHtml.push(`<a onclick="loadScanAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-qrcode w-5"></i><span>Scan QR</span></a>`);
      } else if (role === 'guru') {
        menuHtml.push(`<a onclick="loadGuruDashboard()" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white cursor-pointer"><i class="fas fa-home w-5"></i><span>Dashboard</span></a>`);
        menuHtml.push(`<a onclick="loadMonitoringAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-eye w-5"></i><span>Monitoring</span></a>`);
        menuHtml.push(`<a onclick="loadScanAbsensi()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-qrcode w-5"></i><span>Scan QR</span></a>`);
      } else {
        menuHtml.push(`<a onclick="loadSiswaDashboard()" class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-600 text-white cursor-pointer"><i class="fas fa-home w-5"></i><span>Dashboard</span></a>`);
        menuHtml.push(`<a onclick="loadQRCodeSiswa()" class="flex items-center space-x-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 cursor-pointer"><i class="fas fa-id-card w-5"></i><span>Kartu Saya</span></a>`);
      }
      document.getElementById('sidebarMenu').innerHTML = menuHtml.join('');
      
      if (role === 'admin') await loadAdminDashboard();
      else if (role === 'guru') await loadGuruDashboard();
      else await loadSiswaDashboard();
      
      hideLoading();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('mobileOverlay');
      if (window.innerWidth < 768) {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
      } else {
        sidebar.classList.toggle('w-64');
        sidebar.classList.toggle('w-20');
        document.querySelector('main').classList.toggle('md:ml-64');
        document.querySelector('main').classList.toggle('md:ml-20');
      }
    }

    // ==========================================================================
    // ADMIN DASHBOARD (LENGKAP)
    // ==========================================================================
    async function loadAdminDashboard() {
      setActiveMenu('Dashboard');
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-20"><div class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600"></div></div>`;
      
      const result = await apiCall('/absensi/monitoring', 'GET', null, currentUser.token);
      if (result.success) {
        const data = result.data;
        const total = data.length;
        const hadir = data.filter(d=>d.status==='Hadir').length;
        const sakit = data.filter(d=>d.status==='Sakit').length;
        const izin = data.filter(d=>d.status==='Izin').length;
        const alpa = data.filter(d=>d.status==='Alpa').length;
        const belum = total - (hadir + sakit + izin + alpa);
        
        content.innerHTML = `
          <div class="space-y-6">
            <div class="flex justify-between items-center">
              <div>
                <h1 class="text-2xl font-bold">Dashboard Admin</h1>
                <p class="text-gray-500 text-sm mt-1">Pusat kontrol data absensi sekolah</p>
              </div>
              <button onclick="refreshDashboard()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700 transition">
                <i class="fas fa-sync-alt mr-2"></i>Refresh
              </button>
            </div>
            
            <!-- STATISTIK CARDS -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
              <div class="bg-white p-5 rounded-xl shadow-sm border border-indigo-100 relative overflow-hidden group hover:shadow-md transition">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Total Siswa</p>
                <div class="flex justify-between items-center mt-2"><h3 class="text-2xl font-bold text-gray-800">${total}</h3><div class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center"><i class="fas fa-users"></i></div></div>
              </div>
              <div class="bg-white p-5 rounded-xl shadow-sm border border-emerald-100 relative overflow-hidden group hover:shadow-md transition">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Hadir</p>
                <div class="flex justify-between items-center mt-2"><h3 class="text-2xl font-bold text-gray-800">${hadir}</h3><div class="w-8 h-8 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center"><i class="fas fa-check"></i></div></div>
              </div>
              <div class="bg-white p-5 rounded-xl shadow-sm border border-yellow-100 relative overflow-hidden group hover:shadow-md transition">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Sakit</p>
                <div class="flex justify-between items-center mt-2"><h3 class="text-2xl font-bold text-gray-800">${sakit}</h3><div class="w-8 h-8 bg-yellow-100 text-yellow-600 rounded-lg flex items-center justify-center"><i class="fas fa-procedures"></i></div></div>
              </div>
              <div class="bg-white p-5 rounded-xl shadow-sm border border-blue-100 relative overflow-hidden group hover:shadow-md transition">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Izin</p>
                <div class="flex justify-between items-center mt-2"><h3 class="text-2xl font-bold text-gray-800">${izin}</h3><div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center"><i class="fas fa-paper-plane"></i></div></div>
              </div>
              <div class="bg-white p-5 rounded-xl shadow-sm border border-red-100 relative overflow-hidden group hover:shadow-md transition">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Alpa</p>
                <div class="flex justify-between items-center mt-2"><h3 class="text-2xl font-bold text-gray-800">${alpa}</h3><div class="w-8 h-8 bg-red-100 text-red-600 rounded-lg flex items-center justify-center"><i class="fas fa-times"></i></div></div>

          statusInfo = { status: isLate ? 'Terlambat' : 'Hadir', color: isLate ? 'yellow' : 'green', icon: isLate ? 'fa-exclamation-triangle' : 'fa-check-circle', message: `Absen lengkap (Datang: ${absensi.jamDatang}, Pulang: ${absensi.jamPulang})${isLate ? ' (TERLAMBAT)' : ''}`, showForm: false };
        }
        if (absensi.keterangan && (absensi.keterangan === 'Izin' || absensi.keterangan === 'Sakit')) {
          statusInfo = { status: absensi.keterangan, color: absensi.keterangan === 'Izin' ? 'blue' : 'yellow', icon: absensi.keterangan === 'Izin' ? 'fa-envelope' : 'fa-procedures', message: `Mengajukan ${absensi.keterangan.toLowerCase()}`, showForm: false };
        }
      }
      
      content.innerHTML = `
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-2xl p-6 text-white">
              <div class="flex justify-between items-start"><div><p class="text-sm opacity-80">${today}</p><h2 class="text-2xl font-bold">Hai, ${currentUser.nama}</h2><p class="text-indigo-200 text-sm">${currentUser.kelas}</p></div><div class="px-3 py-1.5 bg-white/20 rounded-full text-xs flex items-center gap-2"><i class="fas ${statusInfo.icon}"></i> ${statusInfo.status}</div></div>
              <div class="grid grid-cols-2 gap-4 mt-6"><div class="bg-white/10 rounded-xl p-4 text-center"><p class="text-xs opacity-80">Jam Datang (Batas: ${appConfig.jam_masuk_akhir})</p><p class="text-2xl font-mono font-bold">${absensi?.jamDatang || '--:--'}</p></div><div class="bg-white/10 rounded-xl p-4 text-center"><p class="text-xs opacity-80">Jam Pulang (Buka: ${appConfig.jam_pulang_mulai})</p><p class="text-2xl font-mono font-bold">${absensi?.jamPulang || '--:--'}</p></div></div>
              <div class="mt-4 p-3 bg-white/10 rounded-xl text-sm"><i class="fas fa-info-circle mr-2"></i> ${statusInfo.message}</div>
            </div>
            ${statusInfo.showForm ? `<div class="bg-white rounded-2xl shadow-sm p-6 mt-6"><h3 class="font-bold text-gray-800 mb-4"><i class="fas fa-file-medical text-indigo-500 mr-2"></i> Ajukan Izin / Sakit</h3><form onsubmit="submitIzinSakit(event)" class="space-y-4"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-xs font-bold text-gray-600 mb-1">Jenis</label><select id="jenisIzin" class="w-full p-2 border rounded-lg"><option value="Izin">📝 Izin</option><option value="Sakit">🤒 Sakit</option></select></div><div><label class="block text-xs font-bold text-gray-600 mb-1">Tanggal</label><input type="date" id="tanggalIzin" value="${new Date().toISOString().split('T')[0]}" class="w-full p-2 border rounded-lg"></div></div><div><label class="block text-xs font-bold text-gray-600 mb-1">Keterangan</label><textarea id="keteranganIzin" rows="2" class="w-full p-2 border rounded-lg" placeholder="Contoh: Saya sedang sakit demam / Ada keperluan keluarga..."></textarea></div><button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold"><i class="fas fa-paper-plane mr-2"></i> Kirim Pengajuan</button></form></div>` : ''}
          </div>
          <div class="space-y-4"><div class="bg-white rounded-2xl p-6 text-center"><div class="w-20 h-20 bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white text-3xl mx-auto mb-3">${currentUser.nama.charAt(0)}</div><h3 class="font-bold">${currentUser.nama}</h3><p class="text-gray-500 text-sm">${currentUser.nisn}</p><p class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs inline-block mt-2">${currentUser.kelas}</p></div><button onclick="loadQRCodeSiswa()" class="w-full bg-slate-800 text-white py-3 rounded-xl"><i class="fas fa-qrcode mr-2"></i> Kartu Digital</button><button onclick="loadScanAbsensi()" class="w-full bg-indigo-600 text-white py-3 rounded-xl"><i class="fas fa-camera mr-2"></i> Scan Absensi</button></div>
        </div>
      `;
    }

    window.submitIzinSakit = async (e) => {
      e.preventDefault();
      const jenis = document.getElementById('jenisIzin').value;
      const tanggal = document.getElementById('tanggalIzin').value;
      const keterangan = document.getElementById('keteranganIzin').value;
      if (!tanggal) return Swal.fire({ icon: 'warning', title: 'Pilih Tanggal', text: 'Silakan pilih tanggal pengajuan' });
      showLoading();
      const result = await apiCall('/absensi/izin-sakit', 'POST', { nisn: currentUser.nisn, jenis, tanggal, keterangan, nama: currentUser.nama, kelas: currentUser.kelas }, currentUser.token);
      hideLoading();
      if (result.success) { Swal.fire({ icon: 'success', title: 'Berhasil!', text: `Pengajuan ${jenis.toLowerCase()} telah dikirim`, timer: 2000, showConfirmButton: false }); loadSiswaDashboard(); }

    window.filterSiswa = function() { const keyword = document.getElementById('searchSiswa')?.value.toLowerCase() || ''; document.querySelectorAll('#siswaTable tr').forEach(row => { row.style.display = row.innerText.toLowerCase().includes(keyword) ? '' : 'none'; }); };

    window.editSiswaModal = (s) => showModal(`<div class="bg-white rounded-2xl p-6 max-w-md w-full"><h3 class="text-xl font-bold mb-4">Edit Siswa</h3><form onsubmit="saveSiswa(event, true)"><input name="nama" value="${s.nama}" class="w-full p-2 border rounded mb-3" required><input name="nisn" value="${s.nisn}" class="w-full p-2 border rounded mb-3 bg-gray-100" readonly><input name="kelas" value="${s.kelas}" class="w-full p-2 border rounded mb-3" required><input type="hidden" name="oldNisn" value="${s.nisn}"><div class="flex justify-end gap-2"><button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">Batal</button><button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded">Simpan</button></div></form></div>`);
    async function saveSiswa(e, isEdit) { e.preventDefault(); showLoading(); const fd = new FormData(e.target); const data = { nama: fd.get('nama'), nisn: fd.get('nisn'), kelas: fd.get('kelas') }; let res; if (isEdit) res = await apiCall(`/siswa/${fd.get('oldNisn')}`, 'PUT', data, currentUser.token); else res = await apiCall('/siswa', 'POST', data, currentUser.token); hideLoading(); if (res.success) { closeModal(); loadDataSiswa(); showAlert('success', res.message); } else showAlert('error', res.message); }
    async function deleteSiswa(nisn, nama) { const conf = await Swal.fire({ title: 'Hapus?', text: `Hapus ${nama}?`, icon: 'warning', showCancelButton: true }); if (conf.isConfirmed) { showLoading(); const res = await apiCall(`/siswa/${nisn}`, 'DELETE', null, currentUser.token); hideLoading(); if (res.success) loadDataSiswa(); else showAlert('error', res.message); } }

          <div class="flex justify-between items-center"><div><h1 class="text-2xl font-bold">Kelola Hari Libur</h1><p class="text-gray-500 text-sm">Atur tanggal-tanggal libur (siswa tidak bisa absen)</p></div><button onclick="refreshDashboard()" class="bg-gray-200 px-4 py-2 rounded-lg text-sm"><i class="fas fa-arrow-left mr-2"></i>Kembali</button></div>
          <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><div class="p-5 border-b bg-rose-50"><h3 class="font-bold"><i class="fas fa-calendar-alt text-rose-500 mr-2"></i> Kalender Hari Libur</h3></div><div class="p-5 flex justify-center"><div id="holidayCalendar"></div></div></div>
          <div class="bg-white rounded-xl shadow-sm border overflow-hidden"><div class="p-5 border-b bg-gray-50/50"><h3 class="font-bold"><i class="fas fa-list-ul text-rose-500 mr-2"></i> Daftar Hari Libur</h3><button onclick="refreshDashboard()" class="text-rose-600 text-sm float-right"><i class="fas fa-sync-alt mr-1"></i>Refresh</button></div><div id="liburList" class="divide-y"><div class="p-8 text-center text-gray-400"><i class="fas fa-spinner fa-pulse mr-2"></i> Memuat data...</div></div></div>
        </div>
      `;
      const res = await apiCall('/config/holidays', 'GET', null, currentUser.token);
      if (res.success) {
        holidaysList = res.data;
        renderLiburList(holidaysList);
        initCalendar(holidaysList);
      }
    }

    function renderLiburList(holidays) {
      const container = document.getElementById('liburList');
      if (holidays.length === 0) { container.innerHTML = `<div class="p-12 text-center"><div class="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-calendar-day text-rose-400 text-2xl"></i></div><h4 class="font-bold text-gray-700">Belum Ada Hari Libur</h4><p class="text-gray-400 text-sm mt-1">Tambahkan hari libur melalui kalender di atas</p></div>`; return; }
      container.innerHTML = `<table class="w-full"><thead class="bg-gray-50"><tr><th class="p-4 text-left text-xs font-bold text-gray-500">No</th><th class="p-4 text-left">Tanggal</th><th class="p-4 text-left">Keterangan</th><th class="p-4 text-center w-24">Aksi</th></tr></thead><tbody class="divide-y">${holidays.map((item, index) => `<tr class="hover:bg-gray-50"><td class="p-4">${index+1}</td><td class="p-4"><i class="fas fa-calendar-day text-rose-400 mr-2"></i>${new Date(item.tanggal).toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' })}</td><td class="p-4">${item.keterangan}</td><td class="p-4 text-center"><button onclick="deleteLibur('${item.tanggal}')" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('')}</tbody></table>`;
    }

    function initCalendar(holidays) {
      const holidayDates = holidays.map(h => h.tanggal);
      if (holidayCalendar) holidayCalendar.destroy();
      holidayCalendar = flatpickr("#holidayCalendar", { inline: true, locale: "id", dateFormat: "Y-m-d", onChange: function(selectedDates, dateStr) { if (dateStr && !holidayDates.includes(dateStr)) addLiburFromCalendar(dateStr); else if (dateStr && holidayDates.includes(dateStr)) Swal.fire({ icon: 'warning', title: 'Sudah Libur', text: `Tanggal ${dateStr} sudah terdaftar sebagai hari libur`, timer: 2000, showConfirmButton: false }); }, onDayCreate: function(dObj, dStr, fp, dayElem) { const dateStr = dayElem.dateObj ? flatpickr.formatDate(dayElem.dateObj, "Y-m-d") : null; if (dateStr && holidayDates.includes(dateStr)) dayElem.classList.add('calendar-holiday'); } });
    }

    window.addLiburFromCalendar = async (tanggal) => {
      const { value: keterangan } = await Swal.fire({ title: 'Tambah Hari Libur', text: `Tanggal: ${tanggal}`, input: 'text', inputPlaceholder: 'Masukkan keterangan (contoh: Tahun Baru)', showCancelButton: true, confirmButtonText: 'Simpan', cancelButtonText: 'Batal' });
      if (keterangan) { showLoading(); const res = await apiCall('/config/holidays', 'POST', { tanggal, keterangan }, currentUser.token); hideLoading(); if (res.success) { Swal.fire({ icon: 'success', title: 'Berhasil!', timer: 1500, showConfirmButton: false }); loadKelolaAbsen(); } else Swal.fire({ icon: 'error', title: 'Gagal!', text: res.message }); }
    };

    window.deleteLibur = async (tanggal) => {
      const result = await Swal.fire({ title: 'Hapus Hari Libur?', text: `Hapus libur tanggal ${tanggal}?`, icon: 'warning', showCancelButton: true, confirmButtonColor: '#EF4444', confirmButtonText: 'Ya, Hapus!' });
      if (result.isConfirmed) { showLoading(); const res = await apiCall(`/config/holidays/${tanggal}`, 'DELETE', null, currentUser.token); hideLoading(); if (res.success) { loadKelolaAbsen(); Swal.fire({ icon: 'success', title: 'Terhapus!', timer: 1500, showConfirmButton: false }); } else Swal.fire({ icon: 'error', title: 'Gagal!', text: res.message }); }
    };

    // ==========================================================================
    // SCANNER & KARTU
    // ==========================================================================
    function loadScanAbsensi() {
      setActiveMenu('Scan QR');
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="max-w-sm mx-auto"><div class="bg-white rounded-2xl p-4"><div class="relative w-full aspect-square bg-black rounded-xl overflow-hidden mb-4"><div id="reader" class="w-full h-full"></div><div id="camLoader" class="absolute inset-0 bg-black/80 flex items-center justify-center"><i class="fas fa-spinner fa-pulse text-white text-2xl"></i></div></div><div id="scanResult" class="text-center text-sm mb-3"></div><div class="flex gap-2"><button onclick="startScanner('environment')" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg">Kamera Belakang</button><button onclick="backToDashboard()" class="flex-1 bg-gray-200 py-2 rounded-lg">Kembali</button></div></div></div>`;
      setTimeout(() => startScanner('environment'), 100);
    }
    function startScanner(mode) { if (html5QrCode) html5QrCode.stop().then(() => initScanner(mode)).catch(() => initScanner(mode)); else initScanner(mode); }
    function initScanner(mode) { const loader = document.getElementById('camLoader'); if(loader) loader.style.display = 'flex'; html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({ facingMode: mode }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess, () => {}).then(() => { if(loader) loader.style.display = 'none'; }).catch(() => { if(loader) loader.innerHTML = '<div class="text-white text-center">Gagal akses kamera</div>'; }); }
    async function onScanSuccess(text) { html5QrCode?.stop(); const res = await apiCall('/absensi/scan', 'POST', { nisn: text, scannerRole: currentUser.role, scannerKelas: currentUser.kelas }, currentUser.token); const resDiv = document.getElementById('scanResult'); if (resDiv) { resDiv.innerHTML = `<div class="p-3 rounded-lg ${res.success ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${res.message}</div>`; setTimeout(() => { if (resDiv) resDiv.innerHTML = ''; }, 3000); } }
    function backToDashboard() { if (html5QrCode) html5QrCode.stop().catch(()=>{}); refreshDashboard(); }
    function loadQRCodeSiswa() {
      setActiveMenu('Kartu Saya');
      const content = document.getElementById('mainContent');
      content.innerHTML = `<div class="flex justify-center py-12"><div class="bg-white rounded-3xl shadow-2xl max-w-sm w-full"><div class="bg-gradient-to-r from-indigo-600 to-purple-600 p-6 text-white text-center"><h2 class="text-2xl font-bold">KARTU PELAJAR</h2></div><div class="p-8 text-center"><div class="bg-white p-3 rounded-2xl shadow inline-block mb-5"><div id="qrContainer"></div></div><h3 class="text-2xl font-bold mb-1">${currentUser.nama}</h3><p class="text-indigo-600 font-bold mb-3">${currentUser.nisn}</p><span class="bg-gray-200 px-4 py-1.5 rounded-full text-sm">${currentUser.kelas}</span></div><div class="p-5 flex gap-4"><button onclick="window.print()" class="flex-1 bg-gray-900 text-white py-3 rounded-xl"><i class="fas fa-print mr-2"></i> Cetak</button><button onclick="refreshDashboard()" class="flex-1 border py-3 rounded-xl">Tutup</button></div></div></div>`;
      setTimeout(() => new QRCode(document.getElementById("qrContainer"), { text: String(currentUser.nisn), width: 160, height: 160, colorDark: "#1f2937", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H }), 100);
    }

    function setActiveMenu(menuName) {
      const links = document.querySelectorAll('#sidebarMenu a');
      links.forEach(link => {
        if (link.innerText.includes(menuName)) link.classList.add('bg-indigo-600', 'text-white');
        else link.classList.remove('bg-indigo-600', 'text-white');
      });
      document.getElementById('pageTitle').innerText = menuName === 'Dashboard' ? 'Dashboard' : menuName;
    }

    function refreshDashboard() { if (currentUser.role === 'admin') loadAdminDashboard(); else if (currentUser.role === 'guru') loadGuruDashboard(); else loadSiswaDashboard(); }
    function closeModal() { const modal = document.getElementById('modalContainer'); if (modal) modal.innerHTML = ''; }

    window.refreshDashboard = refreshDashboard;
    window.loadAdminDashboard = loadAdminDashboard;
    window.loadGuruDashboard = loadGuruDashboard;
    window.loadSiswaDashboard = loadSiswaDashboard;
    window.loadDataSiswa = loadDataSiswa;
    window.loadDataGuru = loadDataGuru;
    window.loadMonitoringAbsensi = loadMonitoringAbsensi;
    window.loadRekapAbsensi = loadRekapAbsensi;
    window.loadKelolaAbsen = loadKelolaAbsen;
    window.loadScanAbsensi = loadScanAbsensi;
    window.loadQRCodeSiswa = loadQRCodeSiswa;
    window.startScanner = startScanner;
    window.backToDashboard = backToDashboard;
    window.closeModal = closeModal;
    
    checkSession();
  </script>
</body>
</html>
